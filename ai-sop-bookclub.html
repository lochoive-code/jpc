<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPC EV High-Voltage System Interactive Guide</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue.js (用於單檔案互動邏輯) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #E5E7EB;
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #EF4444;
        }

        [v-cloak] { display: none; }

        @keyframes ping-slow {
            0% { transform: scale(1); opacity: 0.8; }
            70%, 100% { transform: scale(2); opacity: 0; }
        }
        .animate-ping-slow {
            animation: ping-slow 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
    </style>
</head>
<body class="bg-[#F5F5F7]">

    <div id="app" v-cloak class="w-full h-screen overflow-hidden flex items-center justify-center relative p-2 md:p-4">
        
        <!-- 互動地圖主容器 -->
        <div class="relative w-full max-w-5xl aspect-video bg-white rounded-[2rem] md:rounded-[3rem] shadow-[0_40px_100px_rgba(0,0,0,0.06)] border border-white/50 overflow-hidden group/main">
            
            <div class="relative w-full h-full flex items-center justify-center">
                 <!-- EV 底盤背景圖 -->
                 <img 
                   src="https://lochoive-code.github.io/jpc/EV.jpg" 
                   alt="EV Chassis Structure"
                   class="w-full h-full object-contain opacity-95 scale-[1.05] md:scale-100"
                 />

                <!-- 互動點位區 -->
                <div class="absolute inset-0 scale-[1.05] md:scale-100">
                    <div 
                        v-for="prod in products" 
                        :key="prod.id"
                        :style="{ top: prod.top, left: prod.left }"
                        class="absolute -translate-x-1/2 -translate-y-1/2 group cursor-pointer"
                        @click="activeProduct = prod"
                    >
                        <div class="relative flex items-center justify-center">
                            <!-- 圓點按鈕 -->
                            <div class="relative z-30">
                                <div :class="[
                                    'w-2.5 h-2.5 md:w-3 md:h-3 rounded-full border-[1.5px] border-white shadow-lg transition-all duration-500',
                                    activeProduct?.id === prod.id ? 'bg-red-600 scale-125' : 'bg-red-500 group-hover:bg-red-600 group-hover:scale-110'
                                ]"></div>
                                <!-- 呼吸動畫 -->
                                <div class="absolute inset-0 w-full h-full bg-red-500 rounded-full animate-ping-slow opacity-20 scale-125 group-hover:opacity-40"></div>
                            </div>
                              
                            <!-- 產品名稱標籤 -->
                            <div :class="getLabelClass(prod.labelPos)">
                                {{ prod.name }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右下角說明 -->
            <div class="absolute bottom-6 right-8 text-[9px] text-gray-400 font-bold uppercase tracking-widest hidden md:block opacity-60">
                JPC Interconnect • High-Voltage Solutions
            </div>
        </div>

        <!-- 產品詳情彈窗 (Overlay) -->
        <transition 
            enter-active-class="transition duration-300 ease-out"
            enter-from-class="opacity-0"
            enter-to-class="opacity-100"
            leave-active-class="transition duration-200 ease-in"
            leave-from-class="opacity-100"
            leave-to-class="opacity-0"
        >
            <div v-if="activeProduct" class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-8 bg-black/20 backdrop-blur-xl">
                <div class="bg-white w-full max-w-5xl h-full max-h-[90vh] md:max-h-[85vh] rounded-[2.5rem] md:rounded-[3.5rem] shadow-[0_50px_120px_rgba(0,0,0,0.15)] border border-white overflow-hidden flex flex-col relative transform transition-all">
                    
                    <div class="absolute top-0 left-0 right-0 h-2 bg-red-600"></div>

                    <!-- 彈窗頂部 -->
                    <div class="px-8 py-8 md:px-14 md:py-12 flex justify-between items-start bg-white">
                        <div>
                            <h3 class="text-3xl md:text-5xl font-extrabold text-[#1A1A1A] tracking-tight mb-2">
                                {{ activeProduct.name }}
                            </h3>
                            <p class="text-gray-400 text-sm md:text-base font-medium">點擊組件卡片查看官網詳細資訊</p>
                        </div>
                        <button 
                            @click="activeProduct = null"
                            class="w-10 h-10 md:w-14 md:h-14 bg-gray-50 hover:bg-red-50 text-gray-400 hover:text-red-600 rounded-full flex items-center justify-center transition-all duration-300 border border-gray-100 mt-1"
                        >
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                    </div>

                    <!-- 產品網格列表 -->
                    <div class="px-8 pb-10 md:px-14 md:pb-16 overflow-y-auto flex-1 custom-scrollbar">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-8">
                            <div 
                                v-for="(item, i) in activeProduct.items" 
                                :key="i"
                                @click="openLink(item.url)"
                                class="group flex flex-col p-3 bg-white border border-gray-100 transition-all duration-500 rounded-[2rem] text-left outline-none relative hover:border-red-200 hover:shadow-[0_20px_50px_rgba(0,0,0,0.06)] cursor-pointer"
                            >
                                <div class="w-full aspect-square bg-[#FBFBFB] rounded-[1.5rem] overflow-hidden mb-5 border border-gray-50 relative">
                                    <img 
                                        :src="item.img" 
                                        :alt="item.name" 
                                        class="w-full h-full object-cover opacity-90 group-hover:scale-110 transition-all duration-1000"
                                    />
                                    <div v-if="item.spec" class="absolute top-3 right-3">
                                        <span class="text-[10px] md:text-[11px] font-bold text-white bg-red-600 px-3 py-1.5 rounded-full shadow-lg">
                                            {{ item.spec }}
                                        </span>
                                    </div>
                                </div>
                                
                                <div class="px-3 pb-3">
                                    <h4 class="text-sm md:text-base font-bold text-[#1A1A1A] group-hover:text-red-600 transition-colors leading-snug mb-2">
                                        {{ item.name }}
                                    </h4>
                                    <div class="flex items-center text-[10px] md:text-[11px] font-bold text-red-500 tracking-wider transition-all transform translate-y-1 group-hover:translate-y-0 opacity-70 group-hover:opacity-100">
                                        查看詳情 <span class="ml-1 transition-transform group-hover:translate-x-1">→</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </transition>

    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const activeProduct = ref(null);
                
                const products = [
                    {
                        id: 'inverter',
                        name: 'Inverter 逆變器',
                        top: '25%', left: '35%', labelPos: 'left',
                        items: [
                            { name: 'TL200 Series', spec: '200A', img: 'https://lochoive-code.github.io/jpc/1648538235_TL200-3.jpg', url: 'https://www.jpcco.com/lang/tw/product/find/TL200_High_Power_Connector' },
                            { name: 'TL300 High-Power', spec: '250A', img: 'https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=400', url: 'https://www.jpcco.com/lang/tw/product/find/TL300_High_Power_Connector' },
                            { name: 'TL-X Heavy Duty', spec: '350A', img: 'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&q=80&w=400', url: 'https://www.jpcco.com/lang/tw/product/category/EV_Connectors' }
                        ]
                    },
                    {
                        id: 'pdu',
                        name: 'On-Board Charger 車載充電器',
                        top: '60%', left: '67%', labelPos: 'right',
                        items: [
                            { name: 'XL602 3P Series', spec: '23A', img: 'https://images.unsplash.com/photo-1635332829082-c15d4821a44f?auto=format&fit=crop&q=80&w=400', url: 'https://www.jpcco.com/lang/tw/product/category/EV_Connectors' }
                        ]
                    },
                    {
                        id: 'rearMotor',
                        name: 'Rear Motor 後驅電機',
                        top: '55%', left: '59%', labelPos: 'top',
                        items: [
                            { name: 'XLP200 Motor Adapter', spec: '200A', img: 'https://images.unsplash.com/photo-1597733336794-12d05021d510?auto=format&fit=crop&q=80&w=400', url: 'https://www.jpcco.com/lang/tw/product/category/EV_Connectors' }
                        ]
                    },
                    {
                        id: 'batteryPack',
                        name: 'Battery System 電池系統',
                        top: '55%', left: '45%', labelPos: 'bottom',
                        items: [
                            { name: 'Mini MSD Switch', spec: '400A', img: 'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&q=80&w=400', url: 'https://www.jpcco.com/lang/tw/product/category/EV_Connectors' }
                        ]
                    },
                    {
                        id: 'frontMotor',
                        name: 'Front Motor 前驅電機',
                        top: '38%', left: '31%', labelPos: 'bottom',
                        items: [
                            { name: 'XLP200 Compact', spec: '200A', img: 'https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=400', url: 'https://www.jpcco.com/lang/tw/product/category/EV_Connectors' }
                        ]
                    },
                    {
                        id: 'mcu',
                        name: 'Motor Control Unit 電控單元',
                        top: '20%', left: '38%', labelPos: 'right',
                        items: [
                            { name: 'XL203 Signal Control', spec: '32A', img: 'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&q=80&w=400', url: 'https://www.jpcco.com/lang/tw/product/category/EV_Connectors' }
                        ]
                    }
                ];

                const getLabelClass = (pos) => {
                    const base = "absolute px-2.5 py-1 md:px-3.5 md:py-1.5 bg-white/95 backdrop-blur-md text-[#1A1A1A] border border-gray-100 rounded-lg text-[8.5px] md:text-[9.5px] font-bold opacity-0 group-hover:opacity-100 transition-all duration-300 whitespace-nowrap shadow-xl z-50 group-hover:translate-y-[-1px]";
                    let position = "";
                    switch(pos) {
                        case 'top': position = 'bottom-5 md:bottom-6 left-1/2 -translate-x-1/2'; break;
                        case 'bottom': position = 'top-5 md:top-6 left-1/2 -translate-x-1/2'; break;
                        case 'right': position = 'left-5 md:left-6 top-1/2 -translate-y-1/2'; break;
                        case 'left': position = 'right-5 md:right-6 top-1/2 -translate-y-1/2'; break;
                    }
                    return `${base} ${position}`;
                };

                const openLink = (url) => {
                    if (url) window.open(url, '_blank');
                };

                onMounted(() => {
                    lucide.createIcons();
                });

                // 當 activeProduct 改變後，重新渲染圖標
                Vue.watch(activeProduct, () => {
                    nextTick(() => lucide.createIcons());
                });

                return { products, activeProduct, getLabelClass, openLink };
            }
        }).mount('#app');
    </script>
</body>
</html>
