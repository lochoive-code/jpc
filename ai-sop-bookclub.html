<script>
    function triggerTactileSound(flavor) {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (flavor === 'page_turn') {
                // Soft triangular wave sweep to mimic sliding paper sound
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(140, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.04, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } else if (flavor === 'stamp_placement') {
                // Energetic bright pop-clink
                osc.type = 'sine';
                osc.frequency.setValueAtTime(290, ctx.currentTime);
                osc.frequency.setValueAtTime(440, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.06, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } else if (flavor === 'soft_tap') {
                // Tiny quiet UI click
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                gain.gain.setValueAtTime(0.02, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            }
        } catch(e) {
            console.warn("AudioContext init bypassed or blocked.", e);
        }
    }

    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let sparkGroup = [];
    let confettiLoopId;

    function resizeConfettiCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeConfettiCanvas);
    resizeConfettiCanvas();

    function spawnImpressionSparks() {
        triggerTactileSound('stamp_placement');
        canvas.classList.remove('hidden');
        sparkGroup = [];
        const subtleColors = ['#3A6073', '#5D6D7E', '#A2B9C8', '#D1DCE4', '#CBD5E1'];
        
        for (let i = 0; i < 45; i++) {
            sparkGroup.push({
                x: canvas.width / 2,
                y: canvas.height / 2 + 150,
                size: Math.random() * 4 + 2,
                color: subtleColors[Math.floor(Math.random() * subtleColors.length)],
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.75) * 12 - 3,
                gravity: 0.2,
                span: 80,
                opacity: 1
            });
        }
        
        if (confettiLoopId) cancelAnimationFrame(confettiLoopId);
        renderSparkles();
    }

    function renderSparkles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let live = false;

        sparkGroup.forEach(p => {
            if (p.span > 0) {
                live = true;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.span -= 1;
                p.opacity = p.span / 80;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        });

        if (live) {
            confettiLoopId = requestAnimationFrame(renderSparkles);
        } else {
            canvas.classList.add('hidden');
        }
    }
</script>

    function switchView(targetId) {
        const views = ['view-cover', 'view-menu', 'view-reader'];
        views.forEach(vId => {
            const el = document.getElementById(vId);
            if (vId === targetId) {
                el.classList.remove('hidden');
                setTimeout(() => {
                    el.classList.remove('opacity-0', '-translate-y-2');
                }, 50);
            } else {
                el.classList.add('opacity-0', '-translate-y-2');
                el.classList.add('hidden');
            }
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

            cardWrapper.className = "card-perspective h-44 cursor-pointer";
            
            cardWrapper.innerHTML = `
                <div class="flip-card-inner relative w-full h-full rounded-xl border border-slate-200/60 shadow-sm bg-white" id="menu-card-${item.id}">
                    <!-- Card Front Face -->
                    <div class="backface-hidden absolute inset-0 p-5 flex flex-col justify-between" onclick="performMenuCardFlip(event, '${item.id}')">
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] font-bold tracking-widest text-slate-400 uppercase">${item.num}</span>
                                <span class="text-[9px] text-slate-500 font-medium px-1.5 py-0.5 rounded bg-slate-50 border border-slate-100">${item.dept}</span>
                            </div>
                            <h3 class="serif-heading text-sm text-slate-800 leading-snug group-hover:text-slate-900 transition-colors pt-2">
                                ${item.title}
                            </h3>
                        </div>
                        <div class="flex justify-between items-center text-[10px] text-slate-400 border-t border-slate-100 pt-2.5">
                            <span class="font-medium">導讀者：${item.author}</span>
                            <span class="underline">展開摘要 ➔</span>
                        </div>
                    </div>
                    
                    <!-- Card Back Face / Beautiful editorial summary -->
                    <div class="absolute inset-0 rotate-y-180 backface-hidden p-5 bg-[#F9F7F2] rounded-xl flex flex-col justify-between border border-slate-200/60" onclick="performMenuCardFlip(event, '${item.id}')">
                        <div class="flex-grow flex items-center justify-center">
                            <p class="text-slate-600 text-[11px] leading-relaxed italic text-center font-serif">
                                "${item.summary}"
                            </p>
                        </div>
                        <div class="flex gap-2 border-t border-slate-200/50 pt-2.5">
                            <button onclick="event.stopPropagation(); loadAndReadChapter('${item.id}')" class="w-full py-1.5 bg-slate-800 hover:bg-slate-700 text-white rounded-md text-[10px] tracking-widest font-bold uppercase transition-all">
                                進入全文閱讀 ➔
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            container.appendChild(cardWrapper);
        });
    }

    function performMenuCardFlip(e, articleId) {
        // Prevent trigger if they click internal buttons
        if (e.target.tagName === 'BUTTON') return;
        
        const innerNode = document.getElementById(`menu-card-${articleId}`);
        const isCurrentlyFlipped = innerNode.classList.contains('flipped');
        triggerTactileSound('soft_tap');

        if (isCurrentlyFlipped) {
            innerNode.classList.remove('flipped');
        } else {
            // Dismiss other open cards first to keep layout tidy
            document.querySelectorAll('.flip-card-inner.flipped').forEach(fEl => {
                fEl.classList.remove('flipped');
            });
            innerNode.classList.add('flipped');
        }
    }
</script>

<script>
    function loadAndReadChapter(articleId) {
        triggerTactileSound('page_turn');
        const article = articleData.find(x => x.id === articleId);
        if (!article) return;

        currentActiveChapterId = articleId;

        // Map general labels
        document.getElementById('reader-tracker-num').textContent = article.num;
        document.getElementById('reader-badge-num').textContent = article.num;
        document.getElementById('reader-badge-dept').textContent = article.dept;
        document.getElementById('reader-author-name').textContent = `導言者：${article.author}`;
        document.getElementById('reader-title').textContent = article.title;
        document.getElementById('reader-quote').textContent = article.quote;
        document.getElementById('reader-body').innerHTML = article.content;

        // Render takeaways
        const takeList = document.getElementById('reader-takeaways-list');
        takeList.innerHTML = "";
        article.takeaways.forEach(p => {
            const li = document.createElement('li');
            li.textContent = p;
            takeList.appendChild(li);
        });

        // Initialize Stamp Count Views
        refreshImpressionCounts();

        // Configure Navigation buttons
        const currIndex = articleData.findIndex(x => x.id === articleId);
        document.getElementById('btn-chapter-prev').disabled = (currIndex === 0);
        document.getElementById('btn-chapter-next').disabled = (currIndex === articleData.length - 1);
        
        // Mute button styling based on state
        document.getElementById('btn-chapter-prev').style.opacity = (currIndex === 0) ? "0.3" : "1";
        document.getElementById('btn-chapter-next').style.opacity = (currIndex === articleData.length - 1) ? "0.3" : "1";

        switchView('view-reader');
    }

    function jumpToAdjacentChapter(offset) {
        if (!currentActiveChapterId) return;
        const currIndex = articleData.findIndex(x => x.id === currentActiveChapterId);
        const targetIndex = currIndex + offset;
        
        if (targetIndex >= 0 && targetIndex < articleData.length) {
            loadAndReadChapter(articleData[targetIndex].id);
        }
    }

    function refreshImpressionCounts() {
        if (!currentActiveChapterId) return;
        const article = articleData.find(x => x.id === currentActiveChapterId);
        if (!article) return;

        const stickerTypes = ['resonance', 'rethink', 'inspire', 'bookmark', 'digest'];
        stickerTypes.forEach(type => {
            const badge = document.getElementById(`stamp-count-${type}`);
            if (badge) {
                badge.textContent = article.reactions[type] || 0;
            }

            // Highlighting buttons if user has active reaction
            const btn = badge.parentElement;
            const stateKey = `${currentActiveChapterId}_${type}`;
            if (userReactionsState[stateKey]) {
                btn.classList.add('bg-slate-50', 'border-slate-400');
            } else {
                btn.classList.remove('bg-slate-50', 'border-slate-400');
            }
        });
    }

    function castImpressionSticker(type) {
        if (!currentActiveChapterId) return;
        const article = articleData.find(x => x.id === currentActiveChapterId);
        if (!article) return;

        const stateKey = `${currentActiveChapterId}_${type}`;
        const alreadyStamped = userReactionsState[stateKey] || false;

        if (!alreadyStamped) {
            spawnImpressionSparks();
        } else {
            triggerTactileSound('soft_tap');
        }

        if (alreadyStamped) {
            article.reactions[type] = Math.max(0, (article.reactions[type] || 1) - 1);
            userReactionsState[stateKey] = false;
            displayInlineToast("已悄悄撕下貼紙。");
        } else {
            article.reactions[type] = (article.reactions[type] || 0) + 1;
            userReactionsState[stateKey] = true;

            let textFeedback = "已完成印記投遞！";
            switch(type) {
                case 'resonance': textFeedback = "💡 已投遞「深有同感」心靈貼紙"; break;
                case 'rethink': textFeedback = "🤔 已投遞「促我深思」心靈貼紙"; break;
                case 'inspire': textFeedback = "✨ 已投遞「啟迪思維」心靈貼紙"; break;
                case 'bookmark': textFeedback = "📌 已成功儲存此章節"; break;
                case 'digest': textFeedback = "☕ 已儲存。慢消化，得大智慧"; break;
            }
            displayInlineToast(textFeedback);
        }

        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userReactionsState));
        } catch (e) {
            console.warn("Storage write blocked.", e);
        }

        refreshImpressionCounts();
    }

    function displayInlineToast(message) {
        const toast = document.getElementById('reader-toast');
        if (!toast) return;
        toast.textContent = message;
        toast.classList.remove('opacity-0');

        if (window.toastTimeoutObj) clearTimeout(window.toastTimeoutObj);
        window.toastTimeoutObj = setTimeout(() => {
            toast.classList.add('opacity-0');
        }, 2200);
    }
</script>

<script>
    function showQuickRankSummary() {
        triggerTactileSound('soft_tap');
        const modal = document.getElementById('stats-modal');
        const content = document.getElementById('stats-modal-content');
        
        buildRankListing();

        modal.classList.remove('opacity-0', 'pointer-events-none');
        content.classList.remove('scale-95');
        content.classList.add('scale-100');
    }

    function closeStatsModal() {
        const modal = document.getElementById('stats-modal');
        const content = document.getElementById('stats-modal-content');
        
        modal.classList.add('opacity-0', 'pointer-events-none');
        content.classList.add('scale-95');
        content.classList.remove('scale-100');
    }

    function buildRankListing() {
        const list = document.getElementById('modal-rank-list');
        list.innerHTML = "";

        // Sort by total reactions count descending
        const sorted = [...articleData].sort((a, b) => {
            const sumA = Object.values(a.reactions).reduce((acc, curr) => acc + curr, 0);
            const sumB = Object.values(b.reactions).reduce((acc, curr) => acc + curr, 0);
            return sumB - sumA;
        });

        sorted.forEach((item, index) => {
            const totalSum = Object.values(item.reactions).reduce((acc, curr) => acc + curr, 0);
            const position = String(index + 1).padStart(2, '0');
            
            const itemRow = document.createElement('div');
            itemRow.className = "flex items-center justify-between p-3 border border-slate-100 hover:border-slate-200 bg-slate-50/50 hover:bg-slate-50 rounded-xl cursor-pointer transition-all";
            itemRow.onclick = () => {
                closeStatsModal();
                loadAndReadChapter(item.id);
            };

            itemRow.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="w-6 h-6 rounded-full bg-slate-800 text-white text-[10px] font-mono font-bold flex items-center justify-center">
                        ${position}
                    </span>
                    <div>
                        <span class="text-[9px] text-slate-400 font-bold block uppercase">${item.num} • ${item.dept}</span>
                        <h4 class="serif-heading text-xs text-slate-700 leading-tight">${item.title}</h4>
                    </div>
                </div>
                <div class="flex items-center gap-1 bg-white border border-slate-200 rounded px-2 py-0.5">
                    <span class="text-[9px] text-slate-500 font-mono">${totalSum} 張</span>
                </div>
            `;
            list.appendChild(itemRow);
        });
    }
</script>

<script>
    function setupInteractions() {
        // Dynamic keystroke binding
        document.addEventListener('keydown', (e) => {
            const readerView = document.getElementById('view-reader');
            if (readerView && !readerView.classList.contains('hidden')) {
                if (e.key === 'ArrowLeft') {
                    jumpToAdjacentChapter(-1);
                } else if (e.key === 'ArrowRight') {
                    jumpToAdjacentChapter(1);
                }
            }
        });
    }

    window.onload = function() {
        renderChapterGrid();
        setupInteractions();
    }
</script>

</body>
