<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPC 母親節特別企劃｜致妳的溫柔力量</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-rose: #f43f5e;
            --rose-light: #fb7185;
            --glass-bg: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(255, 255, 255, 1);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #fff1f2 0%, #ffe4e6 100%);
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(244, 63, 94, 0.08) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* 禮物盒動畫 */
        @keyframes boxBounce {
            0%, 100% { transform: translateY(0) scale(1, 1); }
            30% { transform: translateY(-30px) scale(0.9, 1.1); }
            50% { transform: translateY(0) scale(1.1, 0.9); }
            70% { transform: translateY(-10px) scale(0.95, 1.05); }
        }

        @keyframes boxShake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            50% { transform: rotate(-8deg); }
            75% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 40px 100px -20px rgba(244, 63, 94, 0.2);
            padding: 4rem 3rem;
            width: 90%;
            max-width: 600px;
            position: relative;
            z-index: 10;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 互動禮物盒 */
        .gift-container {
            cursor: pointer;
            position: relative;
            margin-bottom: 2.5rem;
            display: inline-block;
            transition: all 0.5s;
        }

        .gift-box-main {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3.5rem;
            box-shadow: 0 20px 40px -10px rgba(244, 63, 94, 0.4);
            animation: boxBounce 2.5s infinite cubic-bezier(0.45, 0, 0.55, 1);
            position: relative;
            z-index: 2;
        }

        .gift-container:hover .gift-box-main {
            animation: boxShake 0.4s infinite;
        }

        /* --- 信封互動專屬樣式 --- */
        .envelope-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 300px;
            height: 200px;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .envelope-wrapper.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* 信封本體與蓋子 */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: #fdf2f2; /* 淺粉紅信封 */
            border-radius: 0 0 10px 10px;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid #fae8e8;
            z-index: 2;
        }

        .envelope::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #fceef0;
            border-right: 150px solid #fceef0;
            border-top: 100px solid transparent;
            z-index: 2;
        }

        /* 信封蓋子動畫 */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #f43f5e;
            z-index: 5;
            transform-origin: top;
            transition: transform 0.6s 0.5s ease-in-out;
        }

        .open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* 信件內容抽出 */
        .letter-content {
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            height: 80%;
            background: white;
            z-index: 3;
            transition: transform 1s 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transform: translateY(0);
            border-radius: 5px;
        }

        .open .letter-content {
            transform: translateY(-130px) scale(1.1);
        }

        /* 全螢幕文字展現 */
        .active-final .glass-card {
            max-width: 650px;
            padding-top: 2rem;
        }

        .serif-title { font-family: 'Noto Serif TC', serif; }
        .luxury-letter-spacing { letter-spacing: 0.3em; }
        .text-gradient {
            background: linear-gradient(135deg, #e11d48 0%, #fb7185 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
        }

        .active-final .content-reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .stagger-1 { transition-delay: 2.2s; }
        .stagger-2 { transition-delay: 2.5s; }
        .stagger-3 { transition-delay: 2.8s; }

        .sticker {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 5;
            transition: all 0.5s;
        }

        @keyframes floatingItems {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .shimmer-btn { animation: buttonPulse 2s infinite alternate; }
        @keyframes buttonPulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <!-- 背景漂浮裝飾 -->
    <div class="sticker" style="top: 15%; left: 10%; animation: floatingItems 6s infinite;">🌸</div>
    <div class="sticker" style="top: 25%; right: 15%; animation: floatingItems 5s infinite -1s;">✨</div>
    <div class="sticker" style="bottom: 20%; left: 12%; animation: floatingItems 7s infinite -2s;">🧸</div>
    <div class="sticker" style="bottom: 25%; right: 10%; animation: floatingItems 4.5s infinite -3s;">🍭</div>

    <!-- 信封容器 (初始隱藏) -->
    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="envelope" id="envelope-body">
            <div class="envelope-flap"></div>
            <div class="letter-content flex flex-col justify-center items-center">
                <i class="fa-solid fa-heart text-rose-500 text-2xl mb-2 animate-bounce"></i>
                <div class="w-12 h-0.5 bg-rose-100 mb-2"></div>
                <p class="text-[10px] text-gray-400 tracking-widest uppercase">Special Message</p>
            </div>
        </div>
    </div>

    <div class="glass-card" id="card-container">
        
        <!-- 首頁：禮物按鈕 (保持 UI Layout) -->
        <div id="lock-state" onclick="triggerEnvelope()">
            <div class="gift-container" id="gift-btn">
                <div class="gift-box-main">
                    <i class="fa-solid fa-gift"></i>
                </div>
            </div>
            <div class="shimmer-btn">
                <h3 class="serif-title text-rose-500 font-black luxury-letter-spacing text-xs uppercase mb-3">專屬驚喜 ‧ 點擊拆開</h3>
                <p class="text-gray-400 text-[9px] tracking-[0.4em] uppercase opacity-60">Tap to open your heart</p>
            </div>
        </div>

        <!-- 解鎖後：最終文案 -->
        <div id="final-content" class="hidden">
            <h1 class="serif-title text-4xl sm:text-5xl font-black text-gray-800 mb-8 tracking-tight leading-snug content-reveal stagger-1">
                致 每一位<br><span class="text-gradient">閃閃發光的妳</span>
            </h1>

            <div class="space-y-6 text-gray-500 text-base sm:text-lg font-light leading-relaxed content-reveal stagger-2">
                <p>是從繁重會議抽身，<br><span class="text-gray-800 font-bold">將情緒轉化為家庭滋養的智慧</span></p>
                <p>是萬籟俱寂之時，<br><span class="text-gray-800 font-bold">守護孩子夢境的那份堅定與溫柔</span></p>
                <p>更是妳在忙碌節奏中，<br><span class="text-gradient font-black">始終優雅譜寫的美好生活旋律</span></p>
            </div>

            <div class="content-reveal stagger-3 mt-10">
                <div class="h-[1px] w-24 bg-rose-200 mx-auto mb-8"></div>
                <h2 class="serif-title text-gradient font-black text-3xl sm:text-4xl tracking-[0.1em] mb-2">母親節快樂</h2>
                <p class="text-rose-300 text-[9px] font-bold luxury-letter-spacing uppercase">Forever Young & Radiant</p>
                
                <button onclick="location.reload()" class="mt-10 border border-gray-800 px-6 py-2 rounded-full text-[10px] tracking-widest uppercase hover:bg-gray-800 hover:text-white transition-all">
                    Reset Experience
                </button>
            </div>
        </div>
    </div>

    <p class="fixed bottom-8 text-gray-400 text-[8px] tracking-[0.8em] font-bold uppercase z-20 opacity-40">
        人資行政部 & 行銷Marketing
    </p>

    <script>
        function triggerEnvelope() {
            const giftBtn = document.getElementById('gift-btn');
            const lockState = document.getElementById('lock-state');
            const envelopeWrapper = document.getElementById('envelope-wrapper');
            const envelopeBody = document.getElementById('envelope-body');
            const finalContent = document.getElementById('final-content');
            const container = document.getElementById('card-container');

            // 1. 禮物盒縮小並消失 (Particle effect)
            giftBtn.style.transform = 'scale(0) rotate(180deg)';
            giftBtn.style.opacity = '0';
            
            // 觸發初始煙火
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#f43f5e', '#ffffff']
            });

            // 2. 信封出現
            setTimeout(() => {
                lockState.style.opacity = '0';
                envelopeWrapper.classList.add('show');
            }, 400);

            // 3. 信封開啟與抽出
            setTimeout(() => {
                envelopeBody.classList.add('open');
                
                // 噴發小愛心 (Sparkles)
                const end = Date.now() + (2 * 1000);
                (function frame() {
                    confetti({
                        particleCount: 2,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#f43f5e']
                    });
                    confetti({
                        particleCount: 2,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#f43f5e']
                    });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());

            }, 1200);

            // 4. 信件展開轉場到最終內容
            setTimeout(() => {
                envelopeWrapper.style.transform = 'translate(-50%, -100%) scale(2)';
                envelopeWrapper.style.opacity = '0';
                container.style.background = 'white';
                
                setTimeout(() => {
                    envelopeWrapper.classList.add('hidden');
                    lockState.classList.add('hidden');
                    finalContent.classList.remove('hidden');
                    container.classList.add('active-final');
                }, 500);
            }, 2800);
        }

        // 微視差效果
        document.addEventListener('mousemove', (e) => {
            const card = document.getElementById('card-container');
            const env = document.getElementById('envelope-wrapper');
            const moveX = (e.clientX - window.innerWidth / 2) / 80;
            const moveY = (e.clientY - window.innerHeight / 2) / 80;
            if (card) card.style.transform = `translate(${moveX}px, ${moveY}px)`;
            if (env && env.classList.contains('show')) {
                env.style.marginLeft = `${moveX * 0.5}px`;
                env.style.marginTop = `${moveY * 0.5}px`;
            }
        });
    </script>
</body>
</html>
